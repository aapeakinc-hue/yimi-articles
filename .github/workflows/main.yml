name: 文章自动发布

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: |
          cd scripts
          npm install

      - name: 执行发布
        env:
          TZ: 'Asia/Shanghai'
        run: bash scripts/publish.sh

      - name: 上传文章文件
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: 今日文章-${{ github.run_number }}
          path: output/*.txt
          retention-days: 7

      - name: 发送通知
        if: success()
        run: |
          echo "✅ 文章发布成功"
          echo "📦 请在Artifacts中下载今日文章"
